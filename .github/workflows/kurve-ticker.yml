name: KURVE Ticker aktualisieren

on:
  schedule:
    # 03:23 + 13:23 UTC (05:23 + 15:23 Berlin bei Sommerzeit).
    # GitHub verzoegert Schedule-Laeufe erfahrungsgemaess um 2-3h.
    - cron: "23 3 * * *"
    - cron: "23 13 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ticker-Daten holen
        run: python3 scripts/update_kurve_ticker.py

      - name: Committen wenn geaendert
        run: |
          if git diff --quiet -- kurve/data/ticker.json; then
            echo "Keine Aenderung - nichts zu committen."
            exit 0
          fi
          git config user.name "kurve-ticker-bot"
          git config user.email "actions@github.com"
          git add kurve/data/ticker.json
          git commit -m "KURVE-Ticker: Partien automatisch aktualisiert"
          git push
